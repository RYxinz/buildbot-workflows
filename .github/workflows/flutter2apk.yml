name: Flutter ZIP2APK Build
on:
  workflow_dispatch:
    inputs:
      app_name:
        required: true
        default: 'FlutterApp'
      job_id:
        required: false
      zip_url:
        description: 'Direct download URL of the Flutter ZIP'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'    # selalu ambil versi terbaru, tidak pin
          cache: true

      - name: Download, extract & build APK
        run: |
          set -e

          echo "Flutter version: $(flutter --version | head -1)"

          curl -L "${{ inputs.zip_url }}" -o project.zip
          mkdir -p flutter_src
          unzip -q project.zip -d flutter_src

          PUBSPEC=$(find flutter_src -name "pubspec.yaml" -maxdepth 4 | head -1)
          if [ -z "$PUBSPEC" ]; then
            echo "❌ pubspec.yaml tidak ditemukan! Isi ZIP:"
            find flutter_src -type f | head -30
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PUBSPEC")
          echo "✅ Project: $PROJECT_DIR"
          cd "$PROJECT_DIR"

          # Disable analytics biar tidak hang
          flutter config --no-analytics

          flutter pub get
          flutter build apk --release --no-tree-shake-icons

          cp build/app/outputs/flutter-apk/app-release.apk /tmp/output.apk
          echo "✅ APK: $(du -sh /tmp/output.apk)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-flutter-${{ inputs.job_id }}-${{ github.run_number }}
          path: /tmp/output.apk
          retention-days: 3
