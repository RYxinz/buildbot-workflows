name: Flutter ZIP2APK Build
on:
  workflow_dispatch:
    inputs:
      app_name:
        required: true
        default: 'FlutterApp'
      job_id:
        required: false
      zip_url:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Build APK
        run: |
          set -e
          flutter config --no-analytics
          curl -L "${{ inputs.zip_url }}" -o project.zip
          mkdir -p flutter_src
          unzip -q project.zip -d flutter_src
          PUBSPEC=$(find flutter_src -name "pubspec.yaml" -maxdepth 4 | head -1)
          [ -z "$PUBSPEC" ] && echo "❌ pubspec.yaml not found" && exit 1
          PROJECT_DIR=$(dirname "$PUBSPEC")
          cd "$PROJECT_DIR"
          flutter pub add font_awesome_flutter:^11.0.0 2>/dev/null || true
          flutter pub upgrade --major-versions 2>/dev/null || true
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --android-skip-build-dependency-validation
          cp build/app/outputs/flutter-apk/app-release.apk /tmp/output.apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk-flutter-${{ inputs.job_id }}-${{ github.run_number }}
          path: /tmp/output.apk
          retention-days: 3
