name: Web2APK Build
on:
  workflow_dispatch:
    inputs:
      url:
        required: true
      app_name:
        required: true
        default: 'MyApp'
      job_id:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Install Gradle
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          echo "/tmp/gradle-dist/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Generate & Build WebView APK
        run: |
          set -e
          APP_URL="${{ inputs.url }}"
          APP_NAME="${{ inputs.app_name }}"
          PKG="com.buildbot.$(echo "$APP_NAME" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')"
          OUT="webview_project"
          mkdir -p "$OUT/app/src/main/res/values" "$OUT/gradle/wrapper"

          printf 'rootProject.name = "%s"\ninclude ":app"\n' "$APP_NAME" > "$OUT/settings.gradle"

          cat > "$OUT/build.gradle" << 'GRADLE'
buildscript {
  repositories { google(); mavenCentral() }
  dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
}
allprojects { repositories { google(); mavenCentral() } }
GRADLE

          cat > "$OUT/gradle/wrapper/gradle-wrapper.properties" << 'GRADLE'
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
GRADLE

          cat > "$OUT/app/build.gradle" << GRADLE
plugins { id 'com.android.application' }
android {
  namespace '$PKG'
  compileSdk 34
  defaultConfig {
    applicationId '$PKG'
    minSdk 21; targetSdk 34; versionCode 1; versionName '1.0'
  }
  buildTypes { release { minifyEnabled false; signingConfig signingConfigs.debug } }
}
dependencies { implementation 'androidx.appcompat:appcompat:1.6.1' }
GRADLE

          cat > "$OUT/app/src/main/AndroidManifest.xml" << XML
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
  <uses-permission android:name="android.permission.INTERNET"/>
  <application android:label="$APP_NAME" android:usesCleartextTraffic="true"
    android:theme="@style/Theme.AppCompat.Light.NoActionBar">
    <activity android:name=".MainActivity" android:exported="true"
      android:configChanges="orientation|keyboardHidden|screenSize">
      <intent-filter>
        <action android:name="android.intent.action.MAIN"/>
        <category android:name="android.intent.category.LAUNCHER"/>
      </intent-filter>
    </activity>
  </application>
</manifest>
XML

          JPATH="$OUT/app/src/main/java/${PKG//./\/}"
          mkdir -p "$JPATH"
          cat > "$JPATH/MainActivity.java" << JAVA
package $PKG;
import android.os.Bundle; import android.webkit.*;
import androidx.appcompat.app.AppCompatActivity;
public class MainActivity extends AppCompatActivity {
  @Override protected void onCreate(Bundle b) {
    super.onCreate(b);
    WebView wv = new WebView(this); setContentView(wv);
    WebSettings ws = wv.getSettings();
    ws.setJavaScriptEnabled(true); ws.setDomStorageEnabled(true);
    ws.setLoadWithOverviewMode(true); ws.setUseWideViewPort(true);
    wv.setWebViewClient(new WebViewClient()); wv.loadUrl("$APP_URL");
  }
}
JAVA

          cd "$OUT"
          gradle assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: apk-web-${{ inputs.job_id }}-${{ github.run_number }}
          path: webview_project/app/build/outputs/apk/release/app-release.apk
          retention-days: 3
