name: Web2APK Build
on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Website URL'
        required: true
      app_name:
        description: 'App name'
        required: true
        default: 'MyApp'
      job_id:
        required: false
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-web2apk
      - name: Generate WebView project
        run: |
          URL="${{ inputs.url }}"
          APP="${{ inputs.app_name }}"
          PKG="com.buildbot.$(echo "$APP" | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9')"
          OUT="output"
          mkdir -p "$OUT/app/src/main/java/${PKG//./\/}" "$OUT/app/src/main/res/values" "$OUT/gradle/wrapper"
          cat > "$OUT/settings.gradle" <<EOF
          rootProject.name = "$APP"
          include ':app'
          EOF
          cat > "$OUT/build.gradle" <<'EOF'
          buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.3.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF
          cat > "$OUT/gradle/wrapper/gradle-wrapper.properties" <<'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.6.0/gradlew" -o "$OUT/gradlew" || printf '#!/bin/sh\nexec gradle "$@"' > "$OUT/gradlew"
          chmod +x "$OUT/gradlew"
          cat > "$OUT/app/build.gradle" <<EOF
          plugins { id 'com.android.application' }
          android {
            namespace '$PKG'
            compileSdk 34
            defaultConfig { applicationId '$PKG'; minSdk 21; targetSdk 34; versionCode 1; versionName "1.0" }
            buildTypes { release { minifyEnabled false } }
          }
          dependencies { implementation 'androidx.appcompat:appcompat:1.7.0' }
          EOF
          cat > "$OUT/app/src/main/AndroidManifest.xml" <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET"/>
            <application android:label="$APP" android:usesCleartextTraffic="true" android:theme="@style/Theme.AppCompat.Light.NoActionBar">
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
              </activity>
            </application>
          </manifest>
          EOF
          JPATH="$OUT/app/src/main/java/${PKG//./\/}"
          mkdir -p "$JPATH"
          cat > "$JPATH/MainActivity.java" <<EOF
          package $PKG;
          import android.os.Bundle; import android.webkit.*; import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
            @Override protected void onCreate(Bundle b) {
              super.onCreate(b); WebView wv = new WebView(this); setContentView(wv);
              WebSettings s = wv.getSettings(); s.setJavaScriptEnabled(true); s.setDomStorageEnabled(true);
              wv.setWebViewClient(new WebViewClient()); wv.loadUrl("$URL");
            }
          }
          EOF
      - name: Build release APK
        run: cd output && ./gradlew assembleRelease --no-daemon
      - name: Sign APK
        run: |
          cd output/app/build/outputs/apk/release
          $ANDROID_HOME/build-tools/*/apksigner sign --ks ~/.android/debug.keystore --ks-pass pass:android --key-pass pass:android --out signed.apk app-release-unsigned.apk
      - uses: actions/upload-artifact@v4
        with:
          name: apk-web-${{ inputs.job_id }}-${{ github.run_number }}
          path: output/app/build/outputs/apk/release/signed.apk
          retention-days: 3